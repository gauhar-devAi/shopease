<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders - ShopEase</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-page">

  <div class="market-top">
    <span>Free shipping above Rs. 2,500</span>
    <span>Top marketplace picks updated daily</span>
  </div>

  <header class="market-nav-wrap">
    <nav class="market-nav">
      <a class="market-logo" href="index.html">ShopEase</a>

      <div class="market-search-wrap">
        <input
          type="text"
          id="searchInput"
          placeholder="Search brands, products, and categories"
        />
        <select id="categoryFilter">
          <option value="">All Categories</option>
        </select>
        <button class="btn btn-primary" onclick="filterProducts()">Search</button>
      </div>

      <ul class="market-actions">
        <li><a href="index.html">Home</a></li>
        <li><a href="orders.html">Orders</a></li>
        <li class="cart-icon">
          <a href="cart.html">Cart <span class="cart-badge" id="cartCount">0</span></a>
        </li>
        <li id="authLink"><a href="login.html">Login</a></li>
        <li id="changePasswordLink" style="display:none"><a href="change-password.html">Password</a></li>
        <li id="logoutBtn" style="display:none"><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </nav>

    <div class="market-links" id="discover">
      <a href="index.html#products">Today's Deals</a>
      <a href="index.html?category=2#products">Fashion</a>
      <a href="index.html?category=1#products">Electronics</a>
      <a href="index.html?category=3#products">Books</a>
      <a href="index.html?category=4#products">Home & Kitchen</a>
      <a href="admin/dashboard.html" id="adminLink" style="display:none;">Admin</a>
    </div>
  </header>

  <div class="orders-container">
    <h2>📦 My Orders</h2>
    <div id="ordersList">
      <!-- Orders load here -->
    </div>
  </div>

  <footer class="home-footer">
    <p> 2026 ShopEase Marketplace. Inspired by top shopping experiences.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
